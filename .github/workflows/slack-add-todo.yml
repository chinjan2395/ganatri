name: Slack — Add Priority TODO

# Triggered from Slack (via Workflow Builder -> "Send a web request" -> GitHub
# repository_dispatch). Claude formats the free-text request into a well-formed
# priority-TODO line and inserts it at the TOP of the queue in
# docs/DEVELOPMENT_PLAN.md, so the next nightly run picks it up first.
#
# Trigger it with:
#   POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   Authorization: Bearer <PAT with contents:write + actions:write>
#   Accept: application/vnd.github+json
#   { "event_type": "slack-add-todo",
#     "client_payload": { "text": "<your requirement>", "user": "<optional>" } }
on:
  repository_dispatch:
    types: [slack-add-todo]

concurrency:
  group: slack-add-todo
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

jobs:
  add-todo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate payload
        id: payload
        run: |
          TEXT='${{ github.event.client_payload.text }}'
          if [ -z "${TEXT// /}" ]; then
            echo "Empty request text — nothing to queue."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.payload.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Format request into a TODO line (GitHub Models)
        id: ai-format
        if: steps.payload.outputs.ok == 'true'
        continue-on-error: true
        env:
          REQUEST_TEXT: ${{ github.event.client_payload.text }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TARGET_FILE: docs/DEVELOPMENT_PLAN.md
          START_MARKER: "<!-- PRIORITY_TODO:START -->"
          END_MARKER: "<!-- PRIORITY_TODO:END -->"
          CONTEXT_FILE: docs/DEVELOPMENT_PLAN.md
        run: node .github/scripts/github-models-format-todo.js

      - name: Notify Slack — GitHub Models unavailable
        if: steps.payload.outputs.ok == 'true' && steps.ai-format.outcome == 'failure'
        continue-on-error: true
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" \
            ":warning: GitHub Models is unavailable — queuing your request with a fallback formatter. <${RUN_URL}|View run>"

      - name: Ensure TODO queued (fallback if Claude made no edit)
        if: steps.payload.outputs.ok == 'true'
        env:
          REQUEST_TEXT: ${{ github.event.client_payload.text }}
        run: |
          if git diff --quiet -- docs/DEVELOPMENT_PLAN.md; then
            echo "Claude made no edit — inserting TODO via fallback script."
            bash .github/scripts/slack-insert-priority-todo.sh "$REQUEST_TEXT"
          fi
          if git diff --quiet -- docs/DEVELOPMENT_PLAN.md; then
            echo "Could not queue TODO — docs/DEVELOPMENT_PLAN.md unchanged." >&2
            exit 1
          fi

      - name: Commit queued item to main
        id: commit
        if: steps.payload.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add docs/DEVELOPMENT_PLAN.md
          git commit -m "Slack: queue priority TODO from Slack request"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm in Slack (with Run now button)
        if: steps.payload.outputs.ok == 'true' && steps.commit.outputs.changed == 'true'
        run: |
          ITEM=$(awk '/<!-- PRIORITY_TODO:START -->/{f=1; next} /<!-- PRIORITY_TODO:END -->/{f=0} f && /^[[:space:]]*- \[ \]/{print; exit}' \
                   docs/DEVELOPMENT_PLAN.md)
          TITLE=$(bash .github/scripts/slack-nightly-msgs.sh clean-task "$ITEM")
          PAYLOAD=$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg title "$TITLE" '{
            channel: $ch,
            text: ("Queued for the next nightly build: " + $title),
            blocks: [
              { type: "section",
                text: { type: "mrkdwn", text: (":white_check_mark: *Added to the build queue*\n" + $title) } },
              { type: "actions",
                elements: [
                  { type: "button",
                    text: { type: "plain_text", text: "▶️ Run now", emoji: true },
                    style: "primary", action_id: "run_now", value: "run_now" }
                ] }
            ]
          }')
          RESP=$(curl -sS -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD" "https://slack.com/api/chat.postMessage")
          echo "$RESP" | jq -e '.ok' >/dev/null || { echo "Slack post failed: $RESP" >&2; exit 1; }

      - name: Report failure to Slack
        if: failure()
        continue-on-error: true
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" \
            ":x: *Could not add your task to the queue.* Please try again or add it manually in GitHub. <${RUN_URL}|View run logs>"
