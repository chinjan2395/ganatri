name: Ganatri Nightly Build

on:
  schedule:
    - cron: '7 */3 * * *'   # every 3 hours, at :07 (off the :00 congestion window so GitHub is less likely to drop the run)
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Run even if an open nightly/* PR exists (manual override)'
        required: false
        default: 'false'
        type: boolean

# Prevent overlapping runs
concurrency:
  group: ganatri-nightly
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # 1 Â· SETUP & GATE
  #     Prune old branches, decide whether to run, create the
  #     working branch and push it so later jobs can check it out.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  setup-and-gate:
    name: "1 Â· Setup & Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    outputs:
      run:         ${{ steps.gate.outputs.run }}
      branch:      ${{ steps.branch.outputs.name }}
      next_task:   ${{ steps.gate.outputs.next_task }}
      skip_reason: ${{ steps.gate.outputs.skip_reason }}
      open_pr:     ${{ steps.gate.outputs.open_pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Prune merged nightly branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin --prune
          # Delete any nightly/* branch already merged into main; leaves unmerged work untouched.
          for b in $(git branch -r --merged origin/main | grep 'origin/nightly/' | sed 's#origin/##'); do
            echo "Deleting merged branch: $b"
            git push origin --delete "$b" || true
          done

      - name: Decide whether to run
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_RUN_INPUT: ${{ github.event.inputs.force_run || 'false' }}
        run: |
          FORCE_RUN="${FORCE_RUN_INPUT}"
          echo "force_run=${FORCE_RUN}" >> "$GITHUB_OUTPUT"

          # Skip if an unmerged nightly PR is already open â€” avoids re-doing the same task
          # while the previous run's work is sitting in review. Manual force_run bypasses this.
          OPEN_PR=$(gh pr list --base main --state open --json number,headRefName,title \
                      --jq '.[] | select(.headRefName | startswith("nightly/")) | "#\(.number) (\(.headRefName)) â€” \(.title)"' \
                      | head -1)
          if [ "$FORCE_RUN" != "true" ] && [ -n "$OPEN_PR" ]; then
            echo "Skipping â€” open nightly PR exists: ${OPEN_PR}. Merge or close it first (or re-run with force_run)."
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "priority=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=open_pr" >> "$GITHUB_OUTPUT"
            {
              echo "open_pr<<EOF"
              printf '%s\n' "$OPEN_PR"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Status is the first non-empty line after the "## Status" heading, minus any HTML comment.
          STATUS=$(awk '/^## Status/{getline; while ($0 ~ /^[[:space:]]*$/) getline; print; exit}' \
                     docs/nightly/STATE.md | sed 's/<!--.*-->//')
          echo "STATE.md status: ${STATUS}"
          if echo "$STATUS" | grep -q 'BLOCKED'; then
            echo "Skipping Claude run â€” project is BLOCKED, needs human input."
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=blocked" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

          # Surface whether the Priority TODO queue has any unchecked items.
          # The body between the two markers contains unchecked "- [ ]" lines when non-empty.
          PRIORITY=$(awk '/<!-- PRIORITY_TODO:START -->/{f=1; next} /<!-- PRIORITY_TODO:END -->/{f=0} f' \
                       docs/DEVELOPMENT_PLAN.md | grep -c '^[[:space:]]*- \[ \]' || true)
          echo "Priority TODO unchecked items: ${PRIORITY}"
          if [ "${PRIORITY:-0}" -gt 0 ]; then
            echo "priority=true" >> "$GITHUB_OUTPUT"
            TOP_TASK=$(awk '/<!-- PRIORITY_TODO:START -->/{f=1; next} /<!-- PRIORITY_TODO:END -->/{f=0} f && /^[[:space:]]*- \[ \]/{print; exit}' \
                         docs/DEVELOPMENT_PLAN.md)
            echo "Top priority item: ${TOP_TASK}"
            echo "Priority queue is NON-EMPTY â€” Claude will work the top unchecked item (checked history below it is ignored)."
          else
            echo "priority=false" >> "$GITHUB_OUTPUT"
            echo "Priority queue empty â€” Claude will follow the normal phase flow."
          fi

          # Surface the likely unit of work for Slack start notifications.
          NEXT_TASK=$(awk '/<!-- PRIORITY_TODO:START -->/{f=1; next} /<!-- PRIORITY_TODO:END -->/{f=0} f && /^[[:space:]]*- \[ \]/' \
                        docs/DEVELOPMENT_PLAN.md | head -1 \
                        | sed -E 's/^[[:space:]]*- \[ \] //; s/\*\*([^*]+)\*\*.*/\1/')
          if [ -z "$NEXT_TASK" ]; then
            NEXT_TASK=$(awk '/^## Notes for Next Run$/{f=1; next} /^## /{if(f) exit} f && /^[0-9]+\./' \
                          docs/nightly/STATE.md | head -1 \
                          | sed -E 's/^[0-9]+\. //; s/\*\*([^*]+)\*\*.*/\1/')
          fi
          if [ -z "$NEXT_TASK" ]; then
            NEXT_TASK=$(awk '/^## Current Phase$/{getline; while ($0 ~ /^[[:space:]]*$/) getline; print; exit}' \
                          docs/nightly/STATE.md)
          fi
          {
            echo "next_task<<EOF"
            printf '%s\n' "$NEXT_TASK"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack â€” gate skipped
        if: steps.gate.outputs.run != 'true' && steps.gate.outputs.skip_reason != ''
        continue-on-error: true
        env:
          OPEN_PR: ${{ steps.gate.outputs.open_pr }}
        run: |
          if [ "${{ steps.gate.outputs.skip_reason }}" = "open_pr" ]; then
            PR_LINE=$(bash .github/scripts/slack-nightly-msgs.sh clean-pr "$OPEN_PR")
            MSG=":double_vertical_bar: *Nightly paused* â€” ${PR_LINE} is still waiting for review. Merge it (or close it) and the next build can start."
          else
            MSG=":double_vertical_bar: *Nightly paused* â€” the project is blocked and needs your input before the bot can continue."
          fi
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" "$MSG"

      - name: Create and push working branch
        id: branch
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          BRANCH="nightly/$(date +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          # Push immediately so the next job can check it out.
          git push origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Notify Slack â€” run started
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          NEXT_TASK: ${{ steps.gate.outputs.next_task }}
        run: |
          TASK=$(bash .github/scripts/slack-nightly-msgs.sh clean-task "$NEXT_TASK")
          if [ -n "$TASK" ]; then
            TEXT=":hammer_and_wrench: *Nightly build started*"$'\n'"Working on: *${TASK}*"
          else
            TEXT=":hammer_and_wrench: *Nightly build started*"
          fi
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" "$TEXT"

      - name: Lint & typecheck
        if: steps.gate.outputs.run == 'true'
        run: |
          npm run lint
          npm run typecheck

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # 2 Â· CLAUDE IMPLEMENTATION
  #     Run Claude Code to implement the next unit of work.
  #     Claude commits to the branch; we push those commits at
  #     the end so job 3 can see them.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  claude-implement:
    name: "2 Â· Claude Implementation"
    needs: setup-and-gate
    if: needs.setup-and-gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      has_commits: ${{ steps.check-commits.outputs.has_commits }}
      failure_summary: ${{ steps.failure-details.outputs.summary }}
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup-and-gate.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run Claude on next phase
        id: claude
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are working autonomously overnight on the Ganatri project.
            No human is available â€” make safe, conservative decisions.

            STEP 1 â€” Read state and context:
            - Read docs/DEVELOPMENT_PLAN.md FIRST, and pay special attention to the
              "đź”ť Priority TODO (read FIRST every run)" section near the top (the queue lives
              between the <!-- PRIORITY_TODO:START --> and <!-- PRIORITY_TODO:END --> markers).
            - Read docs/nightly/STATE.md (current phase, status, blockers, sequencing notes).
            - Read CLAUDE.md for project conventions and agent routing guidance.
            - Read docs/GAME_RULES.md before touching any game logic.

            STEP 2 â€” Pick exactly ONE unit of work:
            - If STATE.md says BLOCKED, stop immediately â€” do not attempt to work around the blocker.
            - PRIORITY QUEUE FIRST: look at the "đź”ť Priority TODO" section in docs/DEVELOPMENT_PLAN.md.
                - If it has one or more unchecked "- [ ]" items, the TOP unchecked item is your unit
                  of work for this run. It OVERRIDES the current phase. Do it, then mark it "- [x]"
                  with today's date. Ignore the normal phase flow this run.
                - If the queue is empty (only the "_(none)_" placeholder between the markers), fall
                  through to the normal phase flow below.
            - NORMAL FLOW (only when the priority queue is empty): implement the next NOT_STARTED or
              IN_PROGRESS item from the current phase in STATE.md.
            - Do NOT start a second phase. One coherent unit of work per run, finished cleanly.
            - If the current phase has pull-forward sub-items (like the Phase 7 urgent fixes), tackle
              them one at a time in the listed order, updating STATE.md after each one.

            STEP 3 â€” Implement via agents (follow CLAUDE.md exactly):
            You are the coordinator. Do NOT write code directly â€” delegate to the correct agent:
            - packages/engine work â†’ spawn Agent with subagent_type="rules-engine-dev"
            - packages/server work â†’ spawn Agent with subagent_type="backend-dev"
            - packages/web work â†’ spawn Agent with subagent_type="frontend-dev"
            - After implementation is done â†’ spawn Agent with subagent_type="code-reviewer" to verify
            Parallelize independent tasks across agents where possible.
            After all agents complete, run `npm test` yourself to confirm everything passes.
            If tests still fail after 2 fix attempts via agents, STOP and record BLOCKED.

            STEP 4 â€” Update docs/nightly/STATE.md:
            - If the work unit is done and tests pass:
                - If more pull-forward items remain, update "Notes for Next Run" to reflect the next item.
                - If the entire current phase is done, set status COMPLETE, move it to "Completed Phases",
                  and set "Current Phase" to the next one with status NOT_STARTED.
            - If blocked: set status BLOCKED and write a clear, specific entry under
              "Blockers / Needs Human Input" â€” include file paths, error messages, what you tried.
            - Always fill in "Last Run" with today's date, outcome, and a one-line summary.
            - Also update docs/DEVELOPMENT_PLAN.md: mark completed tasks âś…, in-progress đźźˇ.
            - If this run completed a PRIORITY TODO item, mark that "- [ ]" line as "- [x]" with
              today's date in the "đź”ť Priority TODO" section of docs/DEVELOPMENT_PLAN.md (leave it
              checked for history; do not delete it). If the queue is now all-checked, that is fine â€”
              the next run will fall back to the normal phase flow.

            STEP 5 â€” Commit:
            - Stage all changed files (code + STATE.md + DEVELOPMENT_PLAN.md).
            - Commit with a message like: "Nightly: <Phase name> â€” <task title> (complete|partial|blocked)"

            Hard rules:
            - Branch only â€” never touch main directly.
            - Prefer correctness over completeness. A clean partial result with an honest BLOCKED note
              is better than broken code committed to the branch.
            - Never skip tests. Never use --no-verify.
            - If you are unsure about a game rule, mark BLOCKED and ask â€” do not guess.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 60
            --allowedTools Edit,Read,Write,Bash,Agent

      - name: Fail if Claude reported an error
        id: check-claude
        run: bash .github/scripts/check-claude-result.sh "${{ steps.claude.outputs.execution_file }}"

      - name: Push Claude's commits
        id: push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${{ needs.setup-and-gate.outputs.branch }}"

      - name: Check for commits
        id: check-commits
        run: |
          COUNT=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture failure details for Slack
        id: failure-details
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          TASK: ${{ needs.setup-and-gate.outputs.next_task }}
          BRANCH: ${{ needs.setup-and-gate.outputs.branch }}
        run: |
          FAILED_STEP="unknown"
          if [ "${{ steps.check-claude.outcome }}" = "failure" ]; then
            FAILED_STEP="Fail if Claude reported an error"
          elif [ "${{ steps.claude.outcome }}" = "failure" ]; then
            FAILED_STEP="Run Claude on next phase"
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            FAILED_STEP="Push Claude's commits"
          elif [ "${{ steps.check-commits.outcome }}" = "failure" ]; then
            FAILED_STEP="Check for commits"
          fi

          SUMMARY=$(TITLE="Nightly build failed â€” Claude implementation" \
            WORKFLOW="nightly" \
            RUN_URL="$RUN_URL" \
            FAILED_JOB="2 Â· Claude Implementation" \
            FAILED_STEP="$FAILED_STEP" \
            TASK="$TASK" \
            BRANCH="$BRANCH" \
            EXECUTION_FILE="$EXECUTION_FILE" \
            bash .github/scripts/slack-build-failure-msg.sh)
          {
            echo "summary<<EOF"
            printf '%s\n' "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # 3 Â· GENERATE REPORT
  #     Build the development-progress PDF and upload it as an
  #     artifact; also send the report zip to Slack.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  generate-report:
    name: "3 Â· Generate Report"
    needs: [setup-and-gate, claude-implement]
    if: false  # disabled â€” re-enable by removing this line
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    outputs:
      commits: ${{ steps.summary.outputs.commits }}
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup-and-gate.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Chromium for PDF reports
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium

      - name: Generate development report
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Generate an updated Ganatri development-progress report for this run.

            IMPORTANT â€” environment: you are on a Linux CI runner (Ubuntu), NOT macOS.
            When the report-generator agent renders the PDF it must use the Linux Chrome
            binary, not the "/Applications/Google Chrome.app" path. Render with:
              google-chrome --headless=new --disable-gpu --no-pdf-header-footer \
                --virtual-time-budget=10000 \
                --print-to-pdf="<abs>/reports/<slug>-<ts>.pdf" \
                "file://<abs>/reports/<slug>-<ts>.html"
            (If `google-chrome` is missing, fall back to `which chromium-browser` / `chromium`.)

            Spawn Agent with subagent_type="report-generator". Tell it the topic is the
            Ganatri project's development progress, built from the current repo state:
            - docs/DEVELOPMENT_PLAN.md â€” phase-by-phase status and test counts.
            - docs/nightly/STATE.md â€” current phase, last-run outcome, and any blockers.
            - This run's work: inspect recent branch commits with
              `git log origin/main..HEAD --stat` to see what changed (may be empty on a
              no-op run â€” say so honestly in the report).

            The report title is "Ganatri â€” Development Progress" with today's date as the
            subtitle. It should summarize: the current phase, what was completed this run,
            overall progress across all phases, the current test status, and any blockers
            or next steps. Save under reports/ as the agent normally does.

            Do NOT commit anything and do NOT modify docs/DEVELOPMENT_PLAN.md â€” the report
            is published as a build artifact, not checked into git.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools Edit,Read,Write,Bash,Agent

      - name: Ensure development report (fallback if Claude produced nothing)
        run: |
          if [ -z "$(ls -A reports 2>/dev/null)" ]; then
            echo "No reports/ output from Claude â€” generating fallback report."
            bash .github/scripts/generate-nightly-report.sh
          fi
          if [ -z "$(ls -A reports 2>/dev/null)" ]; then
            echo "Could not generate development report." >&2
            exit 1
          fi
          ls -la reports/

      - name: Extract run summary for Slack
        id: summary
        run: |
          COMMITS=$(bash .github/scripts/slack-nightly-msgs.sh commits 5)
          {
            echo "commits<<EOF"
            printf '%s\n' "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set report artifact name
        id: report-artifact
        run: echo "name=ganatri-development-report-$(date +%Y-%m-%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Check report files exist
        id: report-files
        run: |
          if [ -n "$(ls -A reports 2>/dev/null)" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No report files to upload."
          fi

      - name: Upload report artifact
        if: steps.report-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report-artifact.outputs.name }}
          path: reports/
          retention-days: 30

      - name: Send report zip to Slack
        continue-on-error: true
        env:
          RUN_COMMITS: ${{ steps.summary.outputs.commits }}
        run: |
          if [ -z "$(ls -A reports 2>/dev/null)" ]; then
            echo "No report files produced this run â€” nothing to send."
            exit 0
          fi
          ZIP="ganatri-development-report-$(date +%Y-%m-%d-%H%M).zip"
          (cd reports && zip -r "../${ZIP}" . >/dev/null)
          COMMENT=":bar_chart: *Development report*"
          if [ -n "$RUN_COMMITS" ]; then
            COMMENT="${COMMENT}"$'\n'"${RUN_COMMITS}"
          fi
          bash .github/scripts/slack-upload-file.sh \
            "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" "$ZIP" \
            "Ganatri development report" \
            "$COMMENT"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # 4 Â· PUBLISH & NOTIFY
  #     Open the PR (if Claude committed anything) and send the
  #     final Slack status message.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  publish-and-notify:
    name: "4 Â· Publish & Notify"
    needs: [setup-and-gate, claude-implement]
    if: needs.setup-and-gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      failure_summary: ${{ steps.failure-details.outputs.summary }}
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup-and-gate.outputs.branch }}
          fetch-depth: 0

      - name: Open Pull Request
        id: pr
        if: needs.claude-implement.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ needs.setup-and-gate.outputs.branch }}"
          PR_BODY="$(cat <<'EOF'
          ## Autonomous nightly run

          See `docs/nightly/STATE.md` for what was done, what's next, and any blockers.

          **Review before merging** â€” check diff for correctness against game rules in `docs/GAME_RULES.md`.

          đź¤– Generated with [Claude Code](https://claude.ai/claude-code)
          EOF
          )"
          set +e
          PR_ERR=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Nightly build â€” $(date +%Y-%m-%d\ %H:%M)" \
            --body "$PR_BODY" 2>&1)
          PR_EXIT=$?
          set -e
          if [ "$PR_EXIT" -eq 0 ]; then
            PR_URL="$PR_ERR"
          else
            echo "gh pr create failed: $PR_ERR" >&2
            if echo "$PR_ERR" | grep -q 'not permitted to create or approve pull requests'; then
              echo "Fix: repo Settings â†’ Actions â†’ General â†’ Workflow permissions â†’" >&2
              echo "  enable \"Allow GitHub Actions to create and approve pull requests\"." >&2
            fi
            PR_URL=$(gh pr view "$BRANCH" --json url -q .url 2>/dev/null || true)
          fi
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "Pull request: ${PR_URL:-<none>}"
          if [ -z "$PR_URL" ]; then
            {
              echo "pr_error<<EOF"
              printf '%s\n' "$PR_ERR"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Notify Slack â€” run finished
        id: notify-finished
        continue-on-error: true
        env:
          RUN_COMMITS: ''  # needs.generate-report.outputs.commits â€” disabled with report generation
        run: |
          if [ "${{ needs.claude-implement.outputs.has_commits }}" = "true" ]; then
            MSG=":white_check_mark: *Nightly build done* â€” ready for review"
            if [ -n "$RUN_COMMITS" ]; then
              MSG="${MSG}"$'\n'"${RUN_COMMITS}"
            fi
            MSG="${MSG}"$'\n'"${{ steps.pr.outputs.url }}"
          else
            MSG=":information_source: *Nightly build finished* â€” no changes to review this time."
          fi
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" "$MSG"

      - name: Capture failure details for Slack
        id: failure-details
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TASK: ${{ needs.setup-and-gate.outputs.next_task }}
          BRANCH: ${{ needs.setup-and-gate.outputs.branch }}
          PR_ERROR: ${{ steps.pr.outputs.pr_error }}
        run: |
          FAILED_STEP="unknown"
          if [ "${{ steps.pr.outcome }}" = "failure" ]; then
            FAILED_STEP="Open Pull Request"
          elif [ "${{ steps.notify-finished.outcome }}" = "failure" ]; then
            FAILED_STEP="Notify Slack â€” run finished"
          fi
          EXTRA=""
          if [ -n "$PR_ERROR" ]; then
            EXTRA="*PR create error*
\`\`\`
${PR_ERROR}
\`\`\`"
          fi
          SUMMARY=$(TITLE="Nightly build failed â€” publish" \
            WORKFLOW="nightly" \
            RUN_URL="$RUN_URL" \
            FAILED_JOB="4 Â· Publish & Notify" \
            FAILED_STEP="$FAILED_STEP" \
            TASK="$TASK" \
            BRANCH="$BRANCH" \
            EXTRA="$EXTRA" \
            bash .github/scripts/slack-build-failure-msg.sh)
          {
            echo "summary<<EOF"
            printf '%s\n' "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # NOTIFY â€” FAILURE  (runs only when any prior job fails)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  notify-failure:
    name: "Notify â€” Failure"
    needs: [setup-and-gate, claude-implement, publish-and-notify]
    if: failure()
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Slack â€” run failed
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLAUDE_SUMMARY: ${{ needs.claude-implement.outputs.failure_summary }}
          PUBLISH_SUMMARY: ${{ needs.publish-and-notify.outputs.failure_summary }}
          NEXT_TASK: ${{ needs.setup-and-gate.outputs.next_task }}
          BRANCH: ${{ needs.setup-and-gate.outputs.branch }}
        run: |
          if [ -n "$CLAUDE_SUMMARY" ]; then
            MSG="$CLAUDE_SUMMARY"
          elif [ -n "$PUBLISH_SUMMARY" ]; then
            MSG="$PUBLISH_SUMMARY"
          else
            FAILED_JOBS=()
            [ "${{ needs.setup-and-gate.result }}" = "failure" ] && FAILED_JOBS+=("1 Â· Setup & Gate")
            [ "${{ needs.claude-implement.result }}" = "failure" ] && FAILED_JOBS+=("2 Â· Claude Implementation")
            [ "${{ needs.publish-and-notify.result }}" = "failure" ] && FAILED_JOBS+=("4 Â· Publish & Notify")
            EXTRA="*Failed jobs:* ${FAILED_JOBS[*]:-unknown}"
            MSG=$(TITLE="Nightly build failed" \
              WORKFLOW="nightly" \
              RUN_URL="$RUN_URL" \
              TASK="$NEXT_TASK" \
              BRANCH="$BRANCH" \
              EXTRA="$EXTRA" \
              bash .github/scripts/slack-build-failure-msg.sh)
          fi
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" "$MSG"
