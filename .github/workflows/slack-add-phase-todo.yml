name: Slack — Add Phase TODO

# Triggered from Slack by the Cloudflare Worker for /ganatri-phase.
# Claude formats free text into a phase TODO and inserts it into
# docs/phase-nightly/STATE.md so phase-nightly.yml can work on the long-lived
# phase branch without routing partial work to main.
on:
  repository_dispatch:
    types: [slack-add-phase-todo]

concurrency:
  group: slack-add-phase-todo
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

jobs:
  add-phase-todo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate payload
        id: payload
        run: |
          TEXT='${{ github.event.client_payload.text }}'
          if [ -z "${TEXT// /}" ]; then
            echo "Empty phase request text - nothing to queue."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.payload.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Format request into a phase TODO line (Claude)
        id: claude-format
        if: steps.payload.outputs.ok == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A new full-phase development request was submitted from Slack:

            """
            ${{ github.event.client_payload.text }}
            """

            Your ONLY job is to turn this into a single, well-formed phase TODO
            line and insert it into docs/phase-nightly/STATE.md. Do not implement it.

            1. Read docs/phase-nightly/STATE.md, especially the "Phase TODO Queue"
               section between the <!-- PHASE_TODO:START --> and
               <!-- PHASE_TODO:END --> markers.
            2. Read the Phase 9 section in docs/DEVELOPMENT_PLAN.md so the TODO
               references the right package/files and acceptance criterion.
            3. Format the submission as ONE line, in EXACTLY this shape:
                  - [ ] **<concise title>** - <package/files it likely touches>. Acceptance: <one concrete, testable criterion>.
               Keep it to a single line. Be specific, but do not invent scope the
               submitter did not ask for.
            4. Insert your line as the FIRST unchecked item immediately after
               the <!-- PHASE_TODO:START --> marker. Always ADD a new `- [ ]`
               line at the top of the queue. If the only content is "_(none)_",
               replace that placeholder.
            5. Do NOT modify anything else. Do NOT run git. Do NOT commit.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools Edit,Read,Write

      - name: Notify Slack — Claude unavailable
        if: steps.payload.outputs.ok == 'true' && steps.claude-format.outcome == 'failure'
        continue-on-error: true
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" \
            ":warning: Claude is unavailable - queuing your phase request with a fallback formatter. <${RUN_URL}|View run>"

      - name: Ensure phase TODO queued (fallback if Claude made no edit)
        if: steps.payload.outputs.ok == 'true'
        env:
          REQUEST_TEXT: ${{ github.event.client_payload.text }}
        run: |
          if git diff --quiet -- docs/phase-nightly/STATE.md; then
            echo "Claude made no edit - inserting phase TODO via fallback script."
            bash .github/scripts/slack-insert-phase-todo.sh "$REQUEST_TEXT"
          fi
          if git diff --quiet -- docs/phase-nightly/STATE.md; then
            echo "Could not queue phase TODO - docs/phase-nightly/STATE.md unchanged." >&2
            exit 1
          fi

      - name: Commit queued phase item to main
        id: commit
        if: steps.payload.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add docs/phase-nightly/STATE.md
          git commit -m "Slack: queue phase TODO from Slack request"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm in Slack (with Run phase now button)
        if: steps.payload.outputs.ok == 'true' && steps.commit.outputs.changed == 'true'
        run: |
          ITEM=$(awk '/<!-- PHASE_TODO:START -->/{f=1; next} /<!-- PHASE_TODO:END -->/{f=0} f && /^[[:space:]]*- \[ \]/{print; exit}' \
                   docs/phase-nightly/STATE.md)
          TITLE=$(bash .github/scripts/slack-nightly-msgs.sh clean-task "$ITEM")
          PAYLOAD=$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg title "$TITLE" '{
            channel: $ch,
            text: ("Queued for the next phase build: " + $title),
            blocks: [
              { type: "section",
                text: { type: "mrkdwn", text: (":white_check_mark: *Added to the phase queue*\n" + $title) } },
              { type: "actions",
                elements: [
                  { type: "button",
                    text: { type: "plain_text", text: "Run phase now", emoji: true },
                    style: "primary", action_id: "run_phase_now", value: "run_phase_now" }
                ] }
            ]
          }')
          RESP=$(curl -sS -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD" "https://slack.com/api/chat.postMessage")
          echo "$RESP" | jq -e '.ok' >/dev/null || { echo "Slack post failed: $RESP" >&2; exit 1; }

      - name: Report failure to Slack
        if: failure()
        continue-on-error: true
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .github/scripts/slack-notify.sh "$SLACK_BOT_TOKEN" "$SLACK_CHANNEL_ID" \
            ":x: *Could not add your phase task to the queue.* Please try again or add it manually in GitHub. <${RUN_URL}|View run logs>"
