version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ganatri_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ganatri
    ports:
      - "5432:5432"
    volumes:
      - ganatri_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ganatri_postgres_data:
    driver: local
